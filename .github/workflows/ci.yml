name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check, lint & test
    runs-on: ubuntu-latest
    env:
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: https://lx2.golf

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      # Public E2E tests — no login needed.
      # These are anon/public keys, safe to commit (already in every visitor's browser bundle).
      - name: E2E public tests
        run: cd apps/web && npx playwright test --project=public
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ulslyaesagciywombqef.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsc2x5YWVzYWdjaXl3b21icWVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDc1ODUsImV4cCI6MjA4OTQ4MzU4NX0.ibgt6ss_4erzm8ayfY85bUHcxWJXxl--vonxwuPAiHI"

      # Authenticated E2E tests — only run when test-account secrets are configured.
      # To enable: add E2E_TEST_EMAIL and E2E_TEST_PASSWORD to GitHub repo secrets.
      - name: E2E authenticated tests
        if: ${{ env.E2E_TEST_EMAIL != '' }}
        run: cd apps/web && npx playwright test --project=setup --project=chromium
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
